<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<style>
    body{
        background: #2c380c;
    }
    #myForm{
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        width: 100%;
    }
    input,textarea{
        width: 100%;
        padding: 10px;
        margin: 10px;
    }
</style>
<body>
    <div class="logo">
        <img width="100px" src="Images/logo.jpg" alt="">   
        <img id="hambar" src="Images/ham.png" alt="">
    </div>
    <div class="navbar-hide" data-aos="fade-down" id="hide">
        <a href="index.html">Home</a>
        <a href="#about">About us</a>
        <a href="menu.html">Menu</a>
        <a href="#contact">Contact us</a>
        <a href="Franchise.html">Franchise</a>
        <a href="https://www.zomato.com/mandsaur/chezzy-shakes-mandsaur-locality-mandsaur-city/order">Order Now</a>
        <a id="close">Close</a>
    </div>
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="index.html#about">About us</a>
        <a href="menu.html">Menu</a>
        <a href="index.html#contact">Contact us</a>
        <a href="Franchise.html">Franchise</a>
        <a id="action-btn" href="https://www.zomato.com/mandsaur/chezzy-shakes-mandsaur-locality-mandsaur-city/order">Order Now</a>
    </div>

    <div class="container">
        <p id="title">Become a Cheezy ShakesnDessert Owner Today</p>
        <p>Fill this form to get a call back from one of our franchise agents or call us now.</p>
        <form id="myForm">
            <input type="text" id="name" name="name" placeholder="Your Name" required>
            <input type="email" id="email" name="email" placeholder="Your Email" required>
            <input type="number" id="phone" name="phone" placeholder="Phone" required>
            <input type="text" id="profile" name="profile" placeholder="profile" required>
            <input type="text" id="city" name="city" placeholder="city" required>
            <input type="interest" id="interest" name="interest" placeholder="Are you interested" required>
            <textarea id="message" name="message" placeholder="Your Message"></textarea>
            <button type="submit">Submit</button>
        </form>
        
    </div>
    <section id="section-prop" class="footer">
        <p>Cheezy ShakesnDessert | Designed & Developed by Vedansh Derashri</p>
    </section>
</body>

<script>
    (function(){
        emailjs.init("onaYLTxGw8_PH2yd2");  // Replace with your EmailJS Public Key
    })();

    document.getElementById("myForm").addEventListener("submit", function(event) {
        event.preventDefault();

        emailjs.send("service_q1513fk", "template_d1omcjf", {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            city: document.getElementById("city").value,
            interest: document.getElementById("interest").value,
            profile: document.getElementById("profile").value,
            message: document.getElementById("message").value
        })
        
        .then(response => {
            alert("Email sent successfully!");
            console.log("Success:", response);
        })
        .catch(error => {
            alert("Failed to send email.");
            console.log("Error:", error);
        });
    });
</script>
<script src="script.js"></script>
</html>
